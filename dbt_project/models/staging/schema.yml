version: 2

models:
  - name: stg_yellow_trips
    description: "Cleaned yellow taxi trips"
    columns:
      - name: pickup_location_id
        data_tests:
          - not_null
      - name: pickup_at
        data_tests:
          - not_null
      - name: fare_amount
        data_tests:
          - not_null

  - name: stg_taxi_zones
    description: "Cleaned taxi zone lookup"
    columns:
      - name: location_id
        data_tests:
          - not_null
          - unique
      - name: borough
        data_tests:
          - not_null
